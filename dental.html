<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>儿童龋齿风险评估系统</title>
    <script src="../js/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --risk-low: #27ae60;
            --risk-med: #f39c12;
            --risk-high: #c0392b;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--primary-color);
            color: white;
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            flex: 1;
            text-align: center;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .back-btn {
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s ease;
            text-decoration: none;
            color: white;
        }

        /* Form Sections */
        .form-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--primary-color);
            margin-right: 10px;
            border-radius: 2px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Checkbox List */
        .checkbox-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .checkbox-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: #edf5ff;
        }

        .checkbox-item input {
            margin-top: 5px;
            margin-right: 12px;
            transform: scale(1.2);
        }

        .checkbox-content {
            flex: 1;
            font-size: 0.95rem;
        }

        /* Buttons */
        .action-area {
            padding: 30px 20px;
            text-align: center;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
            transition: transform 0.1s;
        }

        .btn-green {
            background: #27ae60;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Result Modal/Section */
        #result-section {
            display: none;
            background: #fff;
            padding: 30px 20px;
            border-top: 5px solid #ddd;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .risk-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .result-detail {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .detail-list {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #555;
            padding-left: 20px;
        }

        .detail-list li {
            margin-bottom: 4px;
        }

        .recommendation-box {
            border-left: 4px solid var(--primary-color);
            background: #eef6ff;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
        }

        .recommendation-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        /* PC Adaptation */
        @media (min-width: 768px) {
            .checkbox-list {
                grid-template-columns: 1fr 1fr;
            }

            body {
                padding: 40px;
            }
        }

        /* --- 核心：打印/保存PDF 专用样式 --- */
        @media print {

            /* 1. 隐藏非报告元素：头部、输入表单、按钮 */
            header,
            .form-section,
            .action-area,
            .back-btn,
            .btn,
            .reset-link {
                display: none !important;
            }

            /* 2. 重置容器样式 */
            body,
            .container {
                background: #fff !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
            }

            /* 3. 强制显示结果区 */
            #result-section {
                display: block !important;
                border: none !important;
                padding: 0 !important;
                animation: none !important;
            }

            /* 4. 优化报告排版 */
            .result-header h3 {
                font-size: 1.5rem;
                margin-top: 0;
            }

            .result-detail,
            .recommendation-box {
                border: 1px solid #ddd;
                background: #fff !important;
                /* 省墨 */
                color: #000 !important;
            }

            /* 保证背景色打印（部分浏览器需要） */
            .risk-badge {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <a href="../index.html" class="back-btn">🏠</a>
            <div style="flex: 1; text-align: center;">
                <h1>口腔筛查系统</h1>
                <p>儿童龋风险评估及管理</p>
            </div>
            <span style="width:32px;"></span>
        </header>

        <div id="input-area">
            <div class="form-section">
                <div class="section-title">基本信息</div>
                <div class="input-group">
                    <label>儿童姓名</label>
                    <input type="text" id="childName" placeholder="请输入姓名" required>
                </div>
                <div class="input-group">
                    <label>编号</label>
                    <input type="text" id="childId" placeholder="请输入编号" required>
                </div>
                <div class="input-group">
                    <label>年龄</label>
                    <input type="text" id="childAge" placeholder="请输入年龄" required>
                </div>
                <div class="input-group">
                    <label>性别</label>
                    <select id="childGender" required>
                        <option value="">请选择性别</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">
                    高风险因素 &nbsp;<small style="font-weight:normal; font-size:0.8em; color:#666">(勾选符合的项)</small>
                </div>
                <div class="checkbox-list">
                    <label class="checkbox-item">
                        <input type="checkbox" class="risk-factor">
                        <span class="checkbox-content">过去2年内有新发龋齿或补牙</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="risk-factor">
                        <span class="checkbox-content">牙齿表面有白斑 / 黑点 / 凹陷</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="risk-factor">
                        <span class="checkbox-content">每日吃甜食 / 喝甜饮料 ≥ 3次</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="risk-factor">
                        <span class="checkbox-content">刷牙不用含氟牙膏，或每日刷牙 ＜ 2次</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="risk-factor">
                        <span class="checkbox-content">很少使用牙线或冲牙器</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="risk-factor">
                        <span class="checkbox-content">口腔经常干燥（如服药后、口干症）</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="risk-factor">
                        <span class="checkbox-content">家人（父母/兄弟姐妹）有多颗蛀牙</span>
                    </label>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">
                    保护因素 &nbsp;<small style="font-weight:normal; font-size:0.8em; color:#666">(勾选符合的项)</small>
                </div>
                <div class="checkbox-list">
                    <label class="checkbox-item">
                        <input type="checkbox" class="protect-factor">
                        <span class="checkbox-content">每天用含氟牙膏刷牙2次 + 牙线1次</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="protect-factor">
                        <span class="checkbox-content">每半年涂氟或做口腔检查</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="protect-factor">
                        <span class="checkbox-content">后牙做过窝沟封闭</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" class="protect-factor">
                        <span class="checkbox-content">饮用氟化水（或使用氟补充剂）</span>
                    </label>
                </div>
            </div>

            <div class="action-area">
                <button class="btn" onclick="calculateRisk()">开始评估</button>
            </div>
        </div>

        <div id="result-section">
            <div class="result-header">
                <h3>口腔健康评估报告</h3>
                <p style="margin-top:10px; font-size:0.9rem; color:#555;">
                    姓名：<b id="resName">--</b> &nbsp;|&nbsp;
                    组别：<span id="resAgeGroup">--</span> &nbsp;|&nbsp;
                    日期：<span id="resDate">--</span>
                </p>
                <div id="riskBadge" class="risk-badge">待评估</div>
            </div>

            <div class="result-detail">
                <p><strong>📊 风险统计：</strong></p>
                <p>高风险因素：<span id="riskCount">0</span> 个，保护因素：<span id="protectCount">0</span> 个</p>

                <p id="adjustmentMsg" style="color: var(--risk-low); font-size: 0.9em; margin-top:5px; display:none;">
                    <i class="icon">★</i> 保护因素充足，风险等级已自动降低一档
                </p>

                <div id="riskDetailsContainer" style="margin-top:15px; display:none;">
                    <hr style="border:0; border-top:1px dashed #ccc; margin:10px 0;">
                    <p style="font-weight:bold; color:var(--risk-high); font-size:0.9rem;">⚠️ 检出的风险项：</p>
                    <ul id="riskList" class="detail-list"></ul>
                </div>
            </div>

            <div class="recommendation-box">
                <div class="recommendation-title">📝 防龋行动建议：</div>
                <p id="recommendationText">请提交评估以获取建议。</p>
            </div>

            <div class="form-section">
                <div class="section-title">上传成绩</div>
                <div class="action-area" style="padding-top:10px;">
                    <button class="btn" onclick="uploadGrade()">提交成绩</button>
                </div>
                <div id="uploadResult" style="margin-top:15px; padding:10px; border-radius:6px; display:none;"></div>
            </div>

            <div class="action-area" style="padding-top:0;">
                <button class="btn btn-green" onclick="saveToPDF()">📄 下载PDF报告</button>
                <button class="btn" onclick="window.print()" style="margin-top:15px;">🖨️ 打印报告</button>
                <div style="margin-top:15px;">
                    <button onclick="resetForm()" class="reset-link"
                        style="background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">重新评估</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateRisk() {
            // 1. 获取输入
            const name = document.getElementById('childName').value || '未填写';
            const riskCheckboxes = document.querySelectorAll('.risk-factor:checked');
            const protectCheckboxes = document.querySelectorAll('.protect-factor:checked');

            const riskCount = riskCheckboxes.length;
            const protectCount = protectCheckboxes.length;

            // 2. 评估逻辑
            let riskLevel = 0; // 0:Low, 1:Med, 2:High
            if (riskCount >= 4) riskLevel = 2;
            else if (riskCount >= 2) riskLevel = 1;
            else riskLevel = 0;

            // 3. 保护因素调整
            let adjusted = false;
            if (protectCount >= 2 && riskLevel > 0) {
                riskLevel--;
                adjusted = true;
            }

            // 4. 数据配置
            const results = {
                0: {
                    text: "低风险",
                    color: "var(--risk-low)",
                    advice: "✅ <b>保持当前习惯</b><br>• 每天早晚使用含氟牙膏（建议1450ppm）刷牙<br>• 每年进行至少1次常规牙科检查"
                },
                1: {
                    text: "中风险",
                    color: "var(--risk-med)",
                    advice: "⚠️ <b>需改进口腔护理</b><br>• 增加使用含氟漱口水（每日或每周）<br>• 每6个月进行专业涂氟<br>• 建议咨询牙医，检查刷牙是否有遗漏死角"
                },
                2: {
                    text: "高风险",
                    color: "var(--risk-high)",
                    advice: "🚨 <b>建议尽快看牙医</b><br>• 需要牙医制定强化预防方案（如使用5000ppm高氟牙膏）<br>• 每3个月复查一次<br>• 严格控制甜食和夜奶习惯"
                }
            };
            const resultData = results[riskLevel];

            // 存储当前风险等级文字
            currentRiskLevel = resultData.text;

            // 5. 更新 UI
            // 填入基本信息供打印
            document.getElementById('resName').innerText = name;
            const today = new Date();
            document.getElementById('resDate').innerText = `${today.getFullYear()}/${today.getMonth() + 1}/${today.getDate()}`;

            // 填入统计数据
            const resultSection = document.getElementById('result-section');
            document.getElementById('riskCount').innerText = riskCount;
            document.getElementById('protectCount').innerText = protectCount;

            const riskBadge = document.getElementById('riskBadge');
            riskBadge.innerText = resultData.text;
            riskBadge.style.backgroundColor = resultData.color;
            document.getElementById('recommendationText').innerHTML = resultData.advice;

            // 显示调整提示
            document.getElementById('adjustmentMsg').style.display = adjusted ? 'block' : 'none';

            // 生成详细风险列表 (用于报告)
            const riskListEl = document.getElementById('riskList');
            const riskContainer = document.getElementById('riskDetailsContainer');
            riskListEl.innerHTML = '';

            if (riskCount > 0) {
                riskCheckboxes.forEach(cb => {
                    const li = document.createElement('li');
                    li.innerText = cb.nextElementSibling.innerText;
                    riskListEl.appendChild(li);
                });
                riskContainer.style.display = 'block';
            } else {
                riskContainer.style.display = 'none';
            }

            // 显示结果区并滚动
            resultSection.style.display = 'block';
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        let submitted = false; // 标记是否已经提交过成绩
        let currentRiskLevel = ''; // 存储当前风险等级文字

        function resetForm() {
            document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
            document.getElementById('childName').value = '';
            document.getElementById('childId').value = '';
            document.getElementById('childAge').value = '';
            document.getElementById('childGender').value = '';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('uploadResult').style.display = 'none';
            submitted = false; // 重置提交状态
            currentRiskLevel = ''; // 重置风险等级
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function uploadGrade() {
            const studentName = document.getElementById('childName').value;
            const studentId = document.getElementById('childId').value;
            const studentAgeInput = document.getElementById('childAge').value;
            const studentGender = document.getElementById('childGender').value;
            const uploadResult = document.getElementById('uploadResult');

            // 检查是否已经评估过
            if (!currentRiskLevel) {
                uploadResult.style.display = 'block';
                uploadResult.style.backgroundColor = '#ffebee';
                uploadResult.style.color = '#c62828';
                uploadResult.textContent = '请先进行评估！';
                return;
            }

            // 检查是否已经提交过成绩
            if (submitted) {
                uploadResult.style.display = 'block';
                uploadResult.style.backgroundColor = '#ffebee';
                uploadResult.style.color = '#c62828';
                uploadResult.textContent = '成绩已经提交过，刷新页面或重新评估后可再次提交！';
                return;
            }

            // 验证输入
            if (!studentName || !studentId || !studentAgeInput || !studentGender) {
                uploadResult.style.display = 'block';
                uploadResult.style.backgroundColor = '#ffebee';
                uploadResult.style.color = '#c62828';
                uploadResult.textContent = '请填写完整的基本信息！';
                return;
            }

            // 验证年龄是否为有效数字
            const studentAge = parseFloat(studentAgeInput);
            if (isNaN(studentAge)) {
                uploadResult.style.display = 'block';
                uploadResult.style.backgroundColor = '#ffebee';
                uploadResult.style.color = '#c62828';
                uploadResult.textContent = '年龄必须是有效的数字！';
                return;
            }

            try {
                uploadResult.style.display = 'block';
                uploadResult.style.backgroundColor = '#e3f2fd';
                uploadResult.style.color = '#1976D2';
                uploadResult.textContent = '正在上传...';

                const response = await fetch('/api/upload-test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: 'dental',
                        name: studentName,
                        id: studentId,
                        age: studentAge,
                        gender: studentGender,
                        result: currentRiskLevel // 上传风险等级文字
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    uploadResult.style.backgroundColor = '#e8f5e8';
                    uploadResult.style.color = '#2e7d32';
                    uploadResult.textContent = '成绩上传成功！';
                    submitted = true; // 标记为已提交
                } else {
                    uploadResult.style.backgroundColor = '#ffebee';
                    uploadResult.style.color = '#c62828';
                    uploadResult.textContent = `上传失败: ${data.message}`;
                }
            } catch (error) {
                uploadResult.style.display = 'block';
                uploadResult.style.backgroundColor = '#ffebee';
                uploadResult.style.color = '#c62828';
                uploadResult.textContent = `请求失败: ${error.message}`;
            }
        }

        // 保存PDF报告 (真实DOM障眼法)
        function saveToPDF() {
            const reportContent = document.getElementById('result-section');
            if (!reportContent) {
                alert('错误：找不到报告内容');
                return;
            }

            // 1. 获取需要隐藏的按钮和上传区域 (避免被打印到PDF里)
            // 你的HTML结构中，这几个部分是在 result-section 内部的
            const actionAreas = reportContent.querySelectorAll('.action-area, .form-section');

            // 暂时隐藏它们
            actionAreas.forEach(el => el.style.display = 'none');

            reportContent.style.animation = 'none';
            reportContent.style.transform = 'none';

            // 2. 动态创建日期和免责声明页脚
            const now = new Date();
            const dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';

            const dateElement = document.createElement('p');
            dateElement.style.textAlign = 'center';
            dateElement.style.color = '#666';
            dateElement.style.marginBottom = '20px';
            dateElement.style.fontSize = '14px';
            dateElement.textContent = '测试日期：' + dateStr;

            const footer = document.createElement('p');
            footer.style.textAlign = 'center';
            footer.style.color = '#999';
            footer.style.marginTop = '30px';
            footer.style.fontSize = '12px';
            footer.style.borderTop = '1px solid #eee';
            footer.style.paddingTop = '15px';
            footer.textContent = '本报告仅供参考，不能替代专业医疗诊断';

            // 将日期塞入头部，将页脚塞入底部
            const headerElement = reportContent.querySelector('.result-header');
            if (headerElement) headerElement.appendChild(dateElement);
            reportContent.appendChild(footer);

            // 3. 配置 PDF 参数
            const opt = {
                margin: [10, 10, 10, 10],
                filename: '儿童龋齿风险评估报告_' + dateStr + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: {
                    scale: 2, // 提高清晰度
                    useCORS: true,
                    backgroundColor: '#ffffff', // 强制白底
                    scrollY: 0,
                    scrollX: 0,
                    windowWidth: document.documentElement.offsetWidth // 保证移动端宽度正确
                },
                jsPDF: {
                    unit: 'mm',
                    format: 'a4',
                    orientation: 'portrait'
                }
            };

            // 为了防止部分手机浏览器白屏，我们给一点点延迟让浏览器渲染刚插入的文字
            setTimeout(() => {
                // 4. 开始生成 PDF
                html2pdf().set(opt).from(reportContent).save().then(() => {
                    // ✅ PDF 生成成功后，立刻恢复页面原状
                    actionAreas.forEach(el => el.style.display = ''); // 显示按钮
                    if (dateElement.parentNode) dateElement.remove();  // 移除日期
                    if (footer.parentNode) footer.remove();            // 移除页脚
                }).catch((error) => {
                    // ❌ 如果报错了，也要恢复页面原状
                    actionAreas.forEach(el => el.style.display = '');
                    if (dateElement.parentNode) dateElement.remove();
                    if (footer.parentNode) footer.remove();
                    console.error('PDF生成失败:', error);
                    alert('PDF生成失败，请重试');
                });
            }, 100); // 延迟 100 毫秒
        }
    </script>

</body>

</html>
